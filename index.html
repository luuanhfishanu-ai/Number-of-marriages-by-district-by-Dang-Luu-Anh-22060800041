<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Hanoi WebGIS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
#map { height: 100vh; }

.legend {
    background: white;
    padding: 10px;
    line-height: 1.5;
}
</style>
</head>
<body>

<h3 style="text-align:center;">
Number of marriages by district in Hanoi <br>
Dang Luu Anh
</h3>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
// tạo map
var map = L.map('map').setView([21.03, 105.85], 10);

// nền OSM
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// hàm màu (bạn có thể chỉnh)
function getColor(d) {
    return d > 2000 ? '#800026' :
           d > 1500 ? '#BD0026' :
           d > 1200 ? '#E31A1C' :
           d > 1000 ? '#FC4E2A' :
           d > 800  ? '#FD8D3C' :
           d > 600  ? '#FEB24C' :
                      '#FFEDA0';
}

// load geojson (ĐÃ SỬA ĐÚNG TÊN FILE)
fetch('data.geojson')
.then(res => res.json())
.then(data => {

    L.geoJSON(data, {

        style: function(feature) {
            return {
                fillColor: getColor(feature.properties.value), // ⚠️ phải có field value
                weight: 1,
                color: 'white',
                fillOpacity: 0.7
            };
        },

        onEachFeature: function(feature, layer) {
            layer.bindPopup(
                feature.properties.name + ": " + feature.properties.value
            );
        }

    }).addTo(map);

});

// legend
var legend = L.control({position: 'topright'});

legend.onAdd = function () {
    var div = L.DomUtil.create('div', 'legend');
    div.innerHTML += "<b>Legend</b><br>";
    div.innerHTML += ">2000<br>1500-2000<br>1200-1500<br>1000-1200<br>800-1000<br>600-800<br><600";
    return div;
};

legend.addTo(map);

</script>

</body>
</html>
